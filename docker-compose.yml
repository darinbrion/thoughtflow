services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: thoughtflow
      POSTGRES_USER: thoughtflow
      POSTGRES_PASSWORD: thoughtflow
    ports:
      - "5432:5432"
    volumes:
      - thoughtflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thoughtflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://thoughtflow:thoughtflow@db:5432/thoughtflow
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      ALLOWED_ORIGINS: http://localhost:5173,capacitor://localhost,https://localhost
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  thoughtflow_data:
